## ------------------------------------------------------------------
## Minimal values for Kind integration testing
## Disables heavy optional services and reduces resource requests
## to fit within GitHub Actions runner limits (~7GB RAM).
## ------------------------------------------------------------------

## Disable ingress (no ingress controller in Kind by default)
ingress:
  enabled: false

## Relax security contexts for Kind (some images need root)
global:
  podSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    capabilities:
      drop:
      - ALL

## ------------------------------------------------------------------
## Infrastructure — minimal resources, no persistence
## ------------------------------------------------------------------
postgresql:
  enabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  podSecurityContext:
    runAsNonRoot: false
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault

clickhouse:
  enabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
