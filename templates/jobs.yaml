{{- if and .Values.kafkaInit.enabled .Values.kafka.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "posthog.fullname" . }}-kafka-init
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "kafka-init") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "kafka-init") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "kafka") | nindent 6 }}
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "kafka") | nindent 10 }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until rpk cluster info --brokers {{ include "posthog.fullname" . }}-kafka:9092 2>/dev/null; do
                echo "Kafka not ready, retrying in 5s..."
                sleep 5
              done
              echo "Kafka is ready!"
      containers:
        - name: kafka-init
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "kafka") | nindent 10 }}
          command:
            - sh
            - -c
            - |
              {{- range .Values.kafkaInit.topics }}
              rpk topic create {{ . }} --brokers {{ include "posthog.fullname" $ }}-kafka:9092 || true
              {{- end }}
              echo "All topics created successfully."
{{- end }}
{{- if .Values.asyncMigrationsCheck.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "posthog.fullname" . }}-async-migrations-check
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "async-migrations-check") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "async-migrations-check") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "posthog.serviceAccountName" . }}
      {{- include "posthog.imagePullSecrets" . | nindent 6 }}
      {{- include "posthog.podSecurityContext" (dict "root" . "component" "web") | nindent 6 }}
      restartPolicy: OnFailure
      containers:
        - name: async-migrations-check
          image: "{{ .Values.posthog.image.repository }}:{{ .Values.posthog.image.tag }}"
          {{- include "posthog.containerSecurityContext" (dict "root" . "component" "web") | nindent 10 }}
          command:
            - python
            - manage.py
            - run_async_migrations
            - --check
          env:
            {{- include "posthog.commonEnv" . | nindent 12 }}
{{- end }}
