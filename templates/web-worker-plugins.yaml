          readinessProbe:
            httpGet:
              path: /_health
              port: 6738
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_health
              port: 6738
            initialDelaySeconds: 30
            periodSeconds: 15
        {{- with .Values.plugins.sidecarContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.plugins.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
