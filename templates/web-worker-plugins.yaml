  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "plugins") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6738
      targetPort: 6738
      protocol: TCP
      name: http
  selector:
    {{- include "posthog.componentSelectorLabels" (dict "root" . "component" "plugins") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthog.fullname" . }}-plugins
  labels:
    {{- include "posthog.componentLabels" (dict "root" . "component" "plugins") | nindent 4 }}
