name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write

jobs:
  release:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install chart-releaser
        run: |
          curl -sSL https://github.com/helm/chart-releaser/releases/download/v1.7.0/chart-releaser_1.7.0_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin cr

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package . -d .cr-release-packages

      - name: Upload chart to GitHub release
        run: |
          cr upload \
            --owner "${{ github.repository_owner }}" \
            --git-repo "$(basename ${{ github.repository }})" \
            --package-path .cr-release-packages \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --skip-existing
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update Helm repo index (gh-pages)
        run: |
          mkdir -p .cr-index
          cr index \
            --owner "${{ github.repository_owner }}" \
            --git-repo "$(basename ${{ github.repository }})" \
            --package-path .cr-release-packages \
            --index-path .cr-index/index.yaml \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --push
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
